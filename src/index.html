<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        h1, h2 { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-[#F9F9F9] text-[#767676]">

    <header class="fixed top-0 left-0 w-full bg-white border-b border-gray-100 z-50">
        <nav class="container mx-auto px-6 h-16 flex items-center justify-between">
            <div class="text-2xl font-bold text-black">
                beauty<span class="text-[#69B99D]">salon.</span>
            </div>
            
            <ul class="hidden md:flex space-x-8 text-black font-medium">
                <li><a href="#" class="text-[#69B99D] border-b-2 border-[#69B99D] pb-1">Início</a></li>
                <li><a href="#" class="hover:text-[#69B99D] transition">Sobre</a></li>
                <li><a href="#" class="hover:text-[#69B99D] transition">Serviços</a></li>
                <li><a href="#" class="hover:text-[#69B99D] transition">Depoimentos</a></li>
                <li><a href="#" class="hover:text-[#69B99D] transition">Contato</a></li>
            </ul>

            <div class="md:hidden text-[#69B99D]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </div>
        </nav>
    </header>

    <section class="pt-32 pb-16 md:pt-48 md:pb-32 overflow-hidden">
        <div class="container mx-auto px-6 flex flex-col md:flex-row-reverse items-center gap-12 md:gap-24">
            
            <div class="relative w-full max-w-md md:max-w-lg">
                <div class="absolute -top-10 -right-6 md:-top-16 md:-right-12 w-full h-full bg-[#95FFD4] opacity-40 rounded-md z-0"></div>
                
                <div class="relative z-10 rounded-md overflow-hidden shadow-xl">
                    <img src="../Img.png" 
                         alt="Cabelereira trabalhando" 
                         class="w-full h-75 md:h-100 object-cover">
                </div>
            </div>

            <div class="text-center md:text-left md:w-1/2 z-20">
                <h1 class="text-3xl md:text-5xl font-bold text-[#0F241D] leading-tight mb-4">
                    Saúde natural para <br class="hidden md:block"> os seus cabelos
                </h1>
                <p class="text-lg mb-8 max-w-sm mx-auto md:mx-0">
                    Um salão exclusivo em São Paulo, especializado em tratamentos naturais.
                </p>
                <a href="#" class="inline-block bg-[#69B99D] text-white px-8 py-4 rounded font-medium hover:bg-[#58a38a] transition shadow-lg">
                    Agendar um horário
                </a>
            </div>

        </div>
    </section>

</body>
</html>
